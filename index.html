<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perimeter Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }

        input, select, button {
            margin: 10px;
            padding: 8px;
            width: 200px;
        }

        #result {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Perimeter Calculator</h1>

    <select id="shape" onchange="showInputs()">
        <option value="square">Square</option>
        <option value="rectangle">Rectangle</option>
        <option value="triangle">Triangle</option>
    </select>

    <div id="inputs"></div>

    <button onclick="calculatePerimeter()">Calculate</button>

    <p id="result"></p>

    <script src="script.js"></script>
</body>
</html>
